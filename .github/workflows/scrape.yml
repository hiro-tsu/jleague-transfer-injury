name: Scrape J-League Transfer & Injury Info

on:
  schedule:
    - cron: '0 1,13 * * *'  # 毎日 JST 10:00 と 22:00 (UTC 1:00 と 13:00)
  workflow_dispatch:         # 手動実行も可能

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python src/scraper.py

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --cached --quiet || git commit -m "chore: update transfer/injury data [$(date -u '+%Y-%m-%dT%H:%M:%SZ')]"
          git push
